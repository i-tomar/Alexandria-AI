[build]
builder = "nixpacks"

[build.nixpacks.plan]
providers = ["python"]

[build.nixpacks.plan.phases.setup]
nixPkgs = ["ffmpeg"]

[build.nixpacks.plan.phases.install]
cmds = ["python -m venv /opt/venv", ". /opt/venv/bin/activate", "pip install -r backend/requirements.txt"]

[deploy]
startCommand = ". /opt/venv/bin/activate && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
